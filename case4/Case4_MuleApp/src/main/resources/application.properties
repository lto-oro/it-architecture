# --- Callcenter SOAP service (Case 4, Teil 1) ------------------------------
cc.service.address=http://192.168.111.9:9090/service/cc
# Poll-Frequenz in Sekunden (60s gemaess Annahme A4)
cc.poll.frequency=60

# --- ActiveMQ Broker (wiederverwendet aus Case 3) --------------------------
activemq.broker-url=tcp://192.168.111.6:61616
activemq.user=group4
activemq.password=Password4

# --- Ziel-Queues (Case 4, Teil 2 / Content-Based Routing) ------------------
# Maintanence -> Routineauftrag -> Aussendienst
queue.new=group4.jobs.new
# Repair      -> dringender Auftrag -> Dispositionsabteilung
queue.urgent=group4.jobs.urgent

# --- JMS type-Property fuer Spring MappingJackson2MessageConverter ---------
# Muss exakt dem FQCN des Case-Clients entsprechen, sonst schlaegt
# setTypeIdPropertyName("_type") + Jackson-Deserialisierung fehl.
jms.type.property=ch.fhnw.digi.mockups.case3.JobMessage
