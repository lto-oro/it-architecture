log4j.rootLogger=WARN, stdout
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.Target=System.out
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%-5p %c{1}:%L - %m%n

log4j.logger.org.apache.kafka.streams.KafkaStreams=INFO
log4j.logger.org.apache.kafka.streams.processor.internals.StreamThread=INFO

# Silence noisy retry warnings on missing topics during bootstrap
log4j.logger.org.apache.kafka.clients.NetworkClient=ERROR
